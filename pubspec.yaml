name: carbur_app
description: "An app that helps you find the lowest petrol prices of your area!"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter:
  provider:
  shared_preferences:
  geolocator:
  http:
  url_launcher:
  flutter_localizations:
    sdk: flutter
  intl:
  shimmer:
  envied:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
