name: carbur_app
description: "An app that helps you find the lowest fuel prices in your area!"
publish_to: 'none'
version: 0.2.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter:
  provider:
  shared_preferences:
  geolocator:
  http:
  url_launcher:
  flutter_localizations:
    sdk: flutter
  intl:
  shimmer:
  envied: ^1.3.2
  logger:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons:
  envied_generator: ^1.3.2
  build_runner: ^2.10.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/brands/

flutter_launcher_icons:
  android: true
  ios: true